<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">

  <title>External Recipient Warning</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <img src="assets/logo.png" class="logo">

    <h1>⚠ External Recipient Warning</h1>

    <p class="subtitle">
      You are about to send this email to external recipients:
    </p>

    <div id="emailList" class="email-list">
    </div>

    <div class="button-group">

      <button class="cancel-btn" onclick="cancelSend()">
        Cancel
      </button>

      <button class="send-btn" onclick="sendAnyway()">
        Send Anyway
      </button>

    </div>

  </div>

  <script src="dialog.js"></script>

</body>
</html>
