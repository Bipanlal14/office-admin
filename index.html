<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>External Recipient Warning</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <div class="logo-container">
      <img
        src="assets/logo.png"
        class="logo"
        alt="Signature Clinic Logo"
      >
    </div>

    <div class="header-warning">
      External Recipient Warning
    </div>

    <h1>⚠ External Recipient Warning</h1>

    <p class="subtitle">
      You are about to send this message to external recipients.
	Please confirm the recipients are correct before sending.
    </p>

    <div id="summaryBox" class="summary-box"></div>

    <div id="emailList" class="email-list"></div>

    <div class="footer-note">
      Always verify attachments and patient information before sending externally.
    </div>

    <div class="button-group">

  <button class="cancel-btn" onclick="cancelSend()">
    Cancel Send
  </button>

  <button class="send-btn" onclick="sendAnyway()">
    Send Anyway
  </button>

</div>

  </div>

  <script src="dialog.js"></script>

</body>
</html>
